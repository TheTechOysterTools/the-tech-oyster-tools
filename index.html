<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Tech Oyster | Headphone Comfort Decision Guide</title>
    <style>
        /* Add your existing CSS styles here */
        .result-box { display: none; }
        .result-box.visible { display: block; }
    </style>
</head>
<body>

    <div id="guide-container">
        <button id="smallCanalsBtn" class="card">Small or sensitive ear canals</button>
        
        <div id="resultBox" class="result-box">
            <h2 id="resultTag"></h2>
            <h3 id="resultTitle"></h3>
            <p id="resultBody"></p>
            <p id="resultBody2"></p>
            <p id="resultAvoid"></p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Your data object
            const data = {
                wfh: { tag: 'For: All-day calls, WFH', title: 'Weight beats padding', body: 'Lightweight is key.', body2: 'Open-back for airflow.', avoid: 'Avoid: heavy closed-back.' },
                // ... add your other categories here ...
            };

            // Your click logic
            const btn = document.getElementById('smallCanalsBtn');
            if (btn) {
                btn.addEventListener('click', function() {
                    const info = data.wfh; // Or your logic to select data
                    
                    // Safe update with null checks
                    const resTag = document.getElementById('resultTag');
                    if (resTag) resTag.textContent = info.tag;

                    const resTitle = document.getElementById('resultTitle');
                    if (resTitle) resTitle.textContent = info.title;

                    const resBody = document.getElementById('resultBody');
                    if (resBody) resBody.textContent = info.body;

                    const resBody2 = document.getElementById('resultBody2');
                    if (resBody2) resBody2.textContent = info.body2;

                    const resAvoid = document.getElementById('resultAvoid');
                    if (resAvoid) resAvoid.textContent = info.avoid;

                    const box = document.getElementById('resultBox');
                    if (box) box.classList.add('visible');
                });
            }
        });
    </script>
</body>
</html>
