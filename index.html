<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Tech Oyster | Headphone Comfort Decision Guide</title>
    <style>
        /* PASTE ALL YOUR CSS HERE */
        body { font-family: sans-serif; padding: 20px; }
        .result-box { display: none; margin-top: 20px; padding: 15px; border: 1px solid #ccc; }
        .result-box.visible { display: block; }
    </style>
</head>
<body>

    <!-- Your button/interface elements -->
    <button id="smallCanalsBtn" class="card">Small or sensitive ear canals</button>
    
    <!-- Result placeholders -->
    <div id="resultBox" class="result-box">
        <h2 id="resultTag"></h2>
        <h3 id="resultTitle"></h3>
        <p id="resultBody"></p>
        <p id="resultBody2"></p>
        <p id="resultAvoid"></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // PASTE YOUR DATA OBJECT AND CLICK LOGIC HERE
            const data = {
                smallCanals: { 
                    tag: 'For: Sensitive Ears', 
                    title: 'Prioritize tip material', 
                    body: 'Look for memory foam.', 
                    body2: 'Small silicone tips.', 
                    avoid: 'Avoid: hard plastic.' 
                }
            };

            const btn = document.getElementById('smallCanalsBtn');
            const box = document.getElementById('resultBox');
            
            if (btn) {
                btn.addEventListener('click', function() {
                    const info = data.smallCanals;
                    
                    if (document.getElementById('resultTag')) document.getElementById('resultTag').textContent = info.tag;
                    if (document.getElementById('resultTitle')) document.getElementById('resultTitle').textContent = info.title;
                    if (document.getElementById('resultBody')) document.getElementById('resultBody').textContent = info.body;
                    if (document.getElementById('resultBody2')) document.getElementById('resultBody2').textContent = info.body2;
                    if (document.getElementById('resultAvoid')) document.getElementById('resultAvoid').textContent = info.avoid;
                    
                    if (box) box.classList.add('visible');
                });
            }
        });
    </script>
</body>
</html>
